<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Daily Tasks</title>
    <style>
        body {
            background-color: #121212;
            color: #eeeeee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #de4c4a;
            margin-bottom: 10px;
        }
        p {
            color: #808080;
            margin-bottom: 24px;
        }
        button {
            background-color: #de4c4a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background-color: #f05d5b;
        }
    </style>
</head>
<body>
    <h1>You are offline</h1>
    <p>Please check your internet connection to access your tasks.</p>
    <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
